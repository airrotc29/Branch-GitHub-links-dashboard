<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>에이스종합관리 통합 시스템</title>
<meta name="description" content="에이스종합관리(주) 통합 업무 시스템 바로가기">
<style>
  :root{
    --navy-0:#070b14; --navy-1:#0c1424; --navy-2:#131d33;
    --gold:#cda85e; --gold-soft:#e7cf9b;
    --text:#eef1f8; --muted:#8f9ab3; --line:rgba(205,168,94,.22);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1100px 560px at 12% -10%, rgba(205,168,94,.10), transparent 60%),
      radial-gradient(900px 520px at 105% 10%, rgba(120,150,255,.08), transparent 55%),
      linear-gradient(180deg, var(--navy-0), var(--navy-1) 45%, var(--navy-0));
    color:var(--text);
    font-family:"Pretendard","Noto Serif KR",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:5.5rem 1.5rem 3rem;
  }
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:3.2rem}
  .brand .mark{
    width:56px;height:56px;border-radius:50%;
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:1.1rem;
    background:linear-gradient(160deg, rgba(205,168,94,.14), transparent);
  }
  .brand .mark svg{width:26px;height:26px;stroke:var(--gold-soft)}
  .brand h1{
    margin:0; font-size:1.7rem; font-weight:700; letter-spacing:.04em;
    background:linear-gradient(120deg, var(--gold-soft), #fff 45%, var(--gold-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{margin:.6rem 0 0; color:var(--muted); font-size:.88rem; letter-spacing:.02em}
  .brand .rule{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-top:1.4rem}

  .grid{
    width:100%; max-width:1080px;
    display:grid; gap:1.4rem;
    grid-template-columns:repeat(auto-fit, minmax(190px, 1fr));
  }
  .card{
    position:relative;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    gap:1rem;
    padding:2.2rem 1.4rem 1.8rem;
    text-decoration:none; color:var(--text);
    background:linear-gradient(165deg, rgba(255,255,255,.045), rgba(255,255,255,.015));
    border:1px solid var(--line);
    border-radius:16px;
    backdrop-filter:blur(6px);
    transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .35s, box-shadow .35s, background .35s;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(160px 120px at 50% -10%, rgba(205,168,94,.18), transparent 70%);
    opacity:0; transition:opacity .35s;
  }
  .card:hover{
    transform:translateY(-6px);
    border-color:rgba(205,168,94,.55);
    box-shadow:0 18px 40px -18px rgba(0,0,0,.6), 0 0 0 1px rgba(205,168,94,.12);
    background:linear-gradient(165deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
  }
  .card:hover::before{opacity:1}
  .icon{
    position:relative;
    width:58px;height:58px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg, rgba(205,168,94,.16), rgba(205,168,94,.02));
    border:1px solid var(--line);
    transition:border-color .35s, background .35s;
  }
  .card:hover .icon{border-color:var(--gold); background:linear-gradient(160deg, rgba(205,168,94,.28), rgba(205,168,94,.04))}
  .icon svg{width:26px;height:26px;stroke:var(--gold-soft);fill:none;stroke-width:1.5}
  .card .label{position:relative;font-size:1.02rem;font-weight:700;letter-spacing:.02em}
  .card .sub{position:relative;font-size:.76rem;color:var(--muted);letter-spacing:.01em}
  .card .go{
    position:relative;
    margin-top:.2rem; font-size:.72rem; color:var(--gold-soft);
    opacity:0; transform:translateY(4px);
    transition:opacity .3s, transform .3s;
    letter-spacing:.06em;
  }
  .card:hover .go{opacity:1; transform:translateY(0)}

  footer{margin-top:4rem;color:var(--muted);font-size:.78rem;letter-spacing:.03em;text-align:center}
  footer .rule{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 1.2rem}
</style>
</head>
<body>

  <div class="brand">
    <div class="mark">
      <svg viewBox="0 0 24 24" stroke-width="1.4" fill="none"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>에이스종합관리 통합 시스템</h1>
    <p>ACE Integrated Management Portal</p>
    <div class="rule"></div>
  </div>

  <div class="grid">
    <a class="card" href="https://airrotc29.github.io/construction-defect-detection-app/" target="_blank" rel="noopener">
      <span class="icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.6 5.6L3 18v3h3l6.1-6.1a4 4 0 0 0 5.6-5.6l-2.65 2.65a1.5 1.5 0 0 1-2.1-2.1L15.6 7.2z"/></svg></span>
      <span class="label">하자관리</span>
      <span class="sub">건설 하자 적출·관리 시스템</span>
      <span class="go">바로가기 →</span>
    </a>

    <a class="card" href="https://airrotc29.github.io/Employee-Evaluation-/site-evaluation-system.html" target="_blank" rel="noopener">
      <span class="icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
      <span class="label">직원평가관리</span>
      <span class="sub">사업장 평가 입력 · 분석</span>
      <span class="go">바로가기 →</span>
    </a>

    <a class="card" href="https://airrotc29.github.io/management-rule/" target="_blank" rel="noopener">
      <span class="icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15Z"/></svg></span>
      <span class="label">관리규약</span>
      <span class="sub">공동주택 관리규약 안내</span>
      <span class="go">바로가기 →</span>
    </a>

    <a class="card" href="https://airrotc29.github.io/Payment-order-manual/" target="_blank" rel="noopener">
      <span class="icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2.5 2.5 0 0 1 2.5-1h.3a2.2 2.2 0 0 1 0 4.4h-.6a2.2 2.2 0 0 0 0 4.4h.3a2.5 2.5 0 0 0 2.5-1"/></svg></span>
      <span class="label">채권관리</span>
      <span class="sub">지급명령 · 채권압류 실무</span>
      <span class="go">바로가기 →</span>
    </a>

    <a class="card" href="https://airrotc29.github.io/branch-communication-webapp/" target="_blank" rel="noopener">
      <span class="icon"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M6 21V9l6-4 6 4v12M10 21v-5h4v5M9 12h.01M15 12h.01M9 9h.01M15 9h.01"/></svg></span>
      <span class="label">지점사업소 관리</span>
      <span class="sub">지점 · 사업소 커뮤니케이션</span>
      <span class="go">바로가기 →</span>
    </a>
  </div>

  <footer>
    <div class="rule"></div>
    에이스종합관리(주)
  </footer>

</body>
</html>
